<script>
    // ------------------------------------------------------------------
    // 1. Mobile Menu Toggle Logic
    // ------------------------------------------------------------------
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const closeMenuButton = document.getElementById('close-menu');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileNavLinks = mobileMenu.querySelectorAll('a');

    mobileMenuButton.addEventListener('click', () => {
        mobileMenu.classList.add('open');
    });

    closeMenuButton.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
    });

    // Close menu when a link is clicked
    mobileNavLinks.forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.remove('open');
        });
    });

    // ------------------------------------------------------------------
    // 2. Scroll-Fade-In Observer (Applies to all .scroll-fade elements)
    // ------------------------------------------------------------------
    const faders = document.querySelectorAll('.scroll-fade');

    const appearOptions = {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px"
    };

    const appearOnScroll = new IntersectionObserver(function(entries, appearOnScroll) {
        entries.forEach(entry => {
            if (!entry.isIntersecting) {
                return;
            }
            // Use setTimeout with the data-delay attribute for staggered animation
            const delay = entry.target.getAttribute('data-delay') || 0;
            setTimeout(() => {
                entry.target.classList.add('visible');
                appearOnScroll.unobserve(entry.target);
            }, delay);
        });
    }, appearOptions);

    faders.forEach(fader => {
        appearOnScroll.observe(fader);
    });

    // ------------------------------------------------------------------
    // 3. Skill Progress Bar Animation
    // ------------------------------------------------------------------
    const skillProgressBars = document.querySelectorAll('.skill-progress-bar');
    const skillSection = document.getElementById('skills');

    const skillObserver = new IntersectionObserver(function(entries, skillObserver) {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                skillProgressBars.forEach(bar => {
                    const width = bar.getAttribute('data-width');
                    bar.style.width = width + '%';
                });
                skillObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.5 });

    if (skillSection) {
        skillObserver.observe(skillSection);
    }
    
    // ------------------------------------------------------------------
    // 4. Back to Top Button Logic
    // ------------------------------------------------------------------
    const backToTopButton = document.getElementById('back-to-top');

    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backToTopButton.classList.add('visible');
        } else {
            backToTopButton.classList.remove('visible');
        }
    });

    backToTopButton.addEventListener('click', () => {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });

    // ------------------------------------------------------------------
    // 5. Particle Generator (for visual flair)
    // ------------------------------------------------------------------
    const particlesContainer = document.getElementById('particles-container');
    const numberOfParticles = 20;

    function createParticle() {
        const particle = document.createElement('div');
        particle.classList.add('particle');

        // Random position
        const size = Math.random() * 3 + 2; // Size between 2px and 5px
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        
        // Random animation
        const duration = Math.random() * 10 + 10; // 10s to 20s
        const delay = Math.random() * 5;
        
        particle.style.animation = `float ${duration}s ease-in-out infinite alternate`;
        particle.style.animationDelay = `-${delay}s`; // Start at a random point

        particlesContainer.appendChild(particle);
    }

    if (particlesContainer) {
        for (let i = 0; i < numberOfParticles; i++) {
            createParticle();
        }
    }
</script>
