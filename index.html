<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Animated Homepage</title>
<style>
body { margin:0; overflow:hidden; font-family: Arial; background: #87ceeb; }
#bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
.hero-container { position:relative; text-align:center; padding-top:50px; color:#333; }
.avatar-container img { width:150px; border-radius:50%; }
.cloud { display:inline-block; background:#fff; padding:10px 20px; border-radius:50px; margin:10px; cursor:pointer; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="hero-container">
  <div class="avatar-container">
    <img src="assets/images/avatar.png" alt="Avatar">
  </div>
  <h1>Assalamu Alaikum, I’m Muhammad Areeb Rizwan</h1>
  <p>Mechanical Engineer | Entrepreneur | Researcher | Aspiring Global Leader</p>
  <div class="clouds">
    <div class="cloud" onclick="alert('Projects clicked')">Projects</div>
    <div class="cloud" onclick="alert('Experience clicked')">Experience</div>
    <div class="cloud" onclick="alert('Certificates clicked')">Certificates</div>
    <div class="cloud" onclick="alert('Contact clicked')">Contact</div>
  </div>
</div>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Cloud {
  constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height/2; this.size=50+Math.random()*50; this.speed=0.3+Math.random()*0.5; }
  draw(){ ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.ellipse(this.x,this.y,this.size,this.size/2,0,0,Math.PI*2); ctx.fill(); }
  update(){ this.x+=this.speed; if(this.x-this.size>canvas.width) this.x=-this.size; this.draw(); }
}
const cloudArr=[]; for(let i=0;i<15;i++) cloudArr.push(new Cloud());
function animate(){ ctx.clearRect(0,0,canvas.width,canvas.height); cloudArr.forEach(c=>c.update()); requestAnimationFrame(animate); }
animate();
window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
</body>
</html>
